<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" font-family="'IBM Plex Mono','Courier New',monospace">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#101214" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="600" height="300" fill="#F2F3F0"/>
  <rect width="600" height="300" fill="url(#grid)"/>

  <!-- reachset tube: abstract kinematic model -->
  <path d="M60 220 C160 200 240 190 330 150 C420 110 490 100 560 110
           L560 60 C480 55 400 60 310 100 C220 140 150 160 60 170 Z"
        fill="#1748FF" fill-opacity="0.10" stroke="#1748FF" stroke-width="1.5"/>
  <!-- dynamic model trajectory escaping the reachset -->
  <path d="M60 196 C170 180 260 168 350 128 C430 92 500 96 574 78"
        fill="none" stroke="#FF4D00" stroke-width="2" stroke-dasharray="7 5"/>
  <!-- falsifying sample points -->
  <g fill="#101214">
    <circle cx="150" cy="184" r="3"/>
    <circle cx="260" cy="167" r="3"/>
    <circle cx="352" cy="127" r="3"/>
    <circle cx="452" cy="92" r="3"/>
  </g>
  <!-- violation marker -->
  <g stroke="#FF4D00" stroke-width="2">
    <circle cx="524" cy="84" r="9" fill="none"/>
    <path d="M524 66v-12M524 102v12M506 84h-12M542 84h12"/>
  </g>
  <text x="500" y="130" font-size="11" fill="#FF4D00" letter-spacing="1">VIOLATION</text>

  <!-- annotations -->
  <text x="60" y="46" font-size="15" fill="#101214" letter-spacing="2">FALSIFYING REACHSET CONFORMANCE</text>
  <text x="60" y="66" font-size="11" fill="#687078" letter-spacing="1.5">BAYESIAN OPTIMIZATION / ROBUSTNESS-GUIDED SEARCH</text>
  <text x="60" y="256" font-size="10" fill="#687078" letter-spacing="1.5">FIG.001 / REACHSET R(t)</text>
  <text x="330" y="256" font-size="10" fill="#687078" letter-spacing="1.5">— MODEL TRACE x(t)</text>
  <line x1="60" y1="238" x2="560" y2="238" stroke="#D3D8D8" stroke-width="1"/>
</svg>
